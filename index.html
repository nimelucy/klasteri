<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Content Architect - Hybrid AI Pro (Enterprise Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        th { cursor: pointer; }
        th:hover { background-color: #e2e8f0; }
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%;
            width: 20px; height: 20px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 p-8 font-sans">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-600">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">SEO Content Architect (Hybrid AI)</h1>
        <p class="text-sm text-gray-600 mb-6">JavaScript Rule-Based Clustering + GPT-4o-mini Grammar Judge</p>
        
        <div class="flex gap-4 mb-4">
            <input type="password" id="apiKey" class="flex-1 p-2 border border-gray-300 rounded focus:ring-blue-500 text-sm" placeholder="Paste API Key SumoPod (sk-...) di sini">
        </div>

        <div class="mb-4 bg-indigo-50 border border-indigo-200 p-4 rounded-lg flex items-center justify-between">
            <div>
                <h3 class="font-bold text-indigo-800 text-sm mb-1"> Integrasi Modul Kamus</h3>
                <p id="kamusStatus" class="text-xs text-indigo-600">Status: <span class="font-bold text-red-500">Belum ada file kamus.js yang di-upload (Kosong)</span></p>
            </div>
            <div>
                <input type="file" id="kamusFile" accept=".js,.json,.txt" class="hidden" onchange="handleKamusUpload(event)">
                <label for="kamusFile" class="bg-indigo-600 text-white px-4 py-2 rounded text-sm font-bold cursor-pointer hover:bg-indigo-700 transition shadow-sm inline-block">
                    <i class="fa-solid fa-file-import mr-1"></i> Upload kamus.js
                </label>
            </div>
        </div>

        <textarea id="dataInput" rows="6" class="w-full p-3 mb-4 border border-gray-300 rounded focus:ring-blue-500 font-mono text-sm" placeholder="Paste data keyword dari Ahrefs/Semrush di sini (termasuk header)..."></textarea>

        <div class="flex gap-4 mb-4">
            <button onclick="processDataHybrid()" id="processBtn" class="bg-blue-600 text-white px-5 py-2 rounded hover:bg-blue-700 transition font-bold flex items-center gap-2">Mulai Proses Hybrid</button>
            <button onclick="copyData()" id="copyBtn" class="hidden bg-green-600 text-white px-5 py-2 rounded hover:bg-green-700 transition font-bold">Copy Hasil</button>
            <button onclick="clearData()" class="bg-gray-200 text-gray-700 px-5 py-2 rounded hover:bg-gray-300 transition font-bold">Reset</button>
        </div>

        <div class="mb-4 flex justify-between items-center bg-gray-100 p-3 rounded">
            <p id="statusMsg" class="text-sm font-medium text-gray-700">Menunggu data masukan...</p>
        </div>

        <div class="overflow-x-auto rounded border">
            <table class="min-w-full bg-white text-sm text-gray-700">
                <thead class="bg-gray-100 border-b-2" id="tableHead"></thead>
                <tbody id="tableBody" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- 1. LOGIKA FILE READER (UPLOAD KAMUS) ---
        let activeKamus = { stopWords: [], intentVerbs: [], entityFixes: {} };

        function handleKamusUpload(event) {
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                try {
                    const extractor = new Function(content + "\n return { stopWords: typeof stopWords !== 'undefined' ? stopWords : [], intentVerbs: typeof intentVerbs !== 'undefined' ? intentVerbs : [], entityFixes: typeof entityFixes !== 'undefined' ? entityFixes : {} };");
                    activeKamus = extractor();
                    
                    document.getElementById('kamusStatus').innerHTML = `Status: <span class="font-bold text-green-600">Terhubung dengan '${file.name}'</span>`;
                    alert("Berhasil! File " + file.name + " telah dibaca oleh sistem.");
                } catch (err) {
                    alert("Gagal membaca file kamus. Pastikan Anda meng-upload file yang benar.\nError: " + err.message);
                }
            };
            reader.readAsText(file);
        }

        // --- 2. LOGIKA UTAMA APLIKASI ---
        let parsedData = [];
        let headers = [];
        let sortDir = [];

        function getClusterKey(keyword) {
            let clean = keyword.toLowerCase().replace(/[\.\-\_\']/g, ' ');
            
            for (let [wrong, correct] of Object.entries(activeKamus.entityFixes)) {
                clean = clean.replace(new RegExp(`\\b${wrong}\\b`, 'g'), correct);
            }

            let words = clean.replace(/[^a-z0-9\s]/g, '').split(/\s+/);
            let filtered = words.filter(w => !activeKamus.stopWords.includes(w) && !activeKamus.intentVerbs.includes(w) && w.length > 0);
            filtered.sort();
            return filtered.join('_'); 
        }

        async function processDataHybrid() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const rawData = document.getElementById('dataInput').value.trim();

            if (!apiKey || !rawData) return alert("API Key dan Data Keyword wajib diisi!");

            const rows = rawData.split('\n').filter(r => r.trim());
            if (rows.length < 2) return;

            headers = rows[0].split('\t').map(h => h.trim());
            const keywordIndex = 0; 
            
            const btn = document.getElementById('processBtn');
            const statusMsg = document.getElementById('statusMsg');
            btn.disabled = true;
            btn.innerHTML = `<div class="loader"></div> Memproses...`;
            statusMsg.innerHTML = `<div class="loader"></div> 1/2: JavaScript sedang mengelompokkan data matematis...`;
            document.getElementById('tableBody').innerHTML = '';

            let clusters = {};
            for (let i = 1; i < rows.length; i++) {
                let cells = rows[i].split('\t').map(c => c.trim());
                let originalKeyword = cells[keywordIndex];
                
                let clusterKey = getClusterKey(originalKeyword);
                if (!clusterKey) clusterKey = "general_" + i; 

                if (!clusters[clusterKey]) {
                    clusters[clusterKey] = { candidates: [], rows: [] };
                }
                
                if (!clusters[clusterKey].candidates.includes(originalKeyword)) {
                    clusters[clusterKey].candidates.push(originalKeyword);
                }
                clusters[clusterKey].rows.push(cells);
            }

            let aiPayload = {};
            for (let key in clusters) {
                aiPayload[key] = clusters[key].candidates;
            }

            statusMsg.innerHTML = `<div class="loader"></div> 2/2: AI (GPT-4o-mini) sedang memfinalisasi grammar dari ${Object.keys(clusters).length} kelompok...`;

            const systemPrompt = `
            Anda adalah Juri Tata Bahasa Inggris tingkat lanjut untuk SEO.
            Saya memberikan objek JSON dimana kunci (key) adalah ID kelompok, dan nilainya (value) adalah array kalimat pencarian.
            
            Tugas Anda: Pilih TEPAT 1 kalimat dari setiap array yang tata bahasanya paling natural, utuh, dan formal, lalu PERBAIKI teks pemenang tersebut dengan 4 aturan ketat berikut:
            
            1. KAPITALISASI: Gunakan huruf besar di awal kalimat dan pada nama entitas/merek/lembaga yang sah (contoh: "doordash" -> "DoorDash", "social security administration" -> "Social Security Administration").
            2. HAPUS TYPO TANDA BACA: Hapus titik, strip, atau tanda baca yang salah tempat/menempel pada kata biasa (contoh: "security.administration" HARUS menjadi "Security Administration", "on.the" HARUS menjadi "on the").
            3. PERLINDUNGAN DOMAIN WEB: JANGAN pernah menghapus titik pada ekstensi domain atau URL yang sah (contoh: "factcheck.org", ".gov" WAJIB dipertahankan).
            4. TANPA TANDA BACA AKHIR: Meskipun keyword tersebut adalah kalimat tanya, JANGAN menambahkan tanda tanya (?) atau titik (.) di akhir kalimat! Biarkan berakhiran huruf biasa (contoh: "How to apply" BUKAN "How to apply?").
            
            BALAS HANYA DENGAN JSON OBJECT dimana kuncinya adalah ID kelompok, dan nilainya adalah String kalimat pemenang yang sudah diperbaiki. Jangan ada teks markdown!
            `;

            try {
                const response = await fetch('https://ai.sumopod.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',   // <-- PERBAIKAN: ganti glm-5.1 dengan model yang tersedia
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: JSON.stringify(aiPayload) }
                        ],
                        temperature: 0.1
                    })
                });

                const jsonResponse = await response.json();
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${jsonResponse.error?.message || JSON.stringify(jsonResponse)}`);
                }
                if (jsonResponse.error) {
                    throw new Error(jsonResponse.error.message);
                }

                let aiText = jsonResponse.choices[0].message.content.replace(/```json/gi, '').replace(/```/g, '').trim();
                // Coba parse JSON, jika gagal, gunakan fallback
                let aiWinners;
                try {
                    aiWinners = JSON.parse(aiText);
                } catch (parseErr) {
                    console.warn("AI response not valid JSON, using fallback:", aiText);
                    // Fallback: gunakan kandidat pertama dari tiap cluster
                    aiWinners = {};
                    for (let key in clusters) {
                        aiWinners[key] = clusters[key].candidates[0];
                    }
                }

                parsedData = [];
                for (let clusterKey in clusters) {
                    let winningKeyword = aiWinners[clusterKey] || clusters[clusterKey].candidates[0]; 
                    let winningRow = clusters[clusterKey].rows.find(r => r[keywordIndex].toLowerCase() === winningKeyword.toLowerCase());
                    if (!winningRow) winningRow = clusters[clusterKey].rows[0]; 

                    winningRow[keywordIndex] = winningKeyword; 
                    parsedData.push(winningRow);
                }

                sortDir = new Array(headers.length).fill(true);
                statusMsg.innerHTML = `<span class="text-green-600 font-bold">✓ Selesai:</span> Kanibalisasi tuntas! Menyusut menjadi ${parsedData.length} keyword dari total ${rows.length - 1} baris mentah.`;
                document.getElementById('copyBtn').classList.remove('hidden');
                
                triggerSort(0);

            } catch (err) {
                console.error(err);
                alert("Error API:\n" + err.message);
                statusMsg.innerHTML = `<span class="text-red-600 font-bold">✗ Gagal memproses AI: ${err.message}</span>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = `Mulai Proses Hybrid`;
            }
        }

        // --- Render Table & Copy Functions ---
        function renderTable() {
            document.getElementById('tableHead').innerHTML = `<tr>${headers.map((h, i) => 
                `<th class="px-6 py-3 text-left font-bold uppercase tracking-wider" onclick="triggerSort(${i})">${h} ⇅</th>`
            ).join('')}</tr>`;

            document.getElementById('tableBody').innerHTML = parsedData.map(row => 
                `<tr class="hover:bg-blue-50">${row.map(cell => `<td class="px-6 py-2 whitespace-nowrap">${cell}</td>`).join('')}</tr>`
            ).join('');
        }

        function triggerSort(colIndex) {
            const isAsc = sortDir[colIndex];
            parsedData.sort((a, b) => {
                const numA = parseFloat(a[colIndex] ? a[colIndex].replace(/[^0-9.-]+/g,"") : "");
                const numB = parseFloat(b[colIndex] ? b[colIndex].replace(/[^0-9.-]+/g,"") : "");
                if (!isNaN(numA) && !isNaN(numB)) return isAsc ? numA - numB : numB - numA;
                return isAsc ? String(a[colIndex]).localeCompare(String(b[colIndex])) : String(b[colIndex]).localeCompare(String(a[colIndex]));
            });
            sortDir[colIndex] = !isAsc;
            renderTable();
        }

        function copyData() {
            if (!parsedData.length) return;
            const tsv = [headers.join('\t'), ...parsedData.map(r => r.join('\t'))].join('\n');
            navigator.clipboard.writeText(tsv).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = "✓ Disalin!";
                setTimeout(() => btn.innerText = "Copy Hasil", 2000);
            });
        }

        function clearData() {
            document.getElementById('dataInput').value = '';
            document.getElementById('tableHead').innerHTML = '';
            document.getElementById('tableBody').innerHTML = '';
            document.getElementById('statusMsg').innerText = 'Menunggu data masukan...';
            document.getElementById('copyBtn').classList.add('hidden');
            parsedData = [];
        }
    </script>
</body>
</html>
